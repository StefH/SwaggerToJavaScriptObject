name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/SwaggerToJavaScriptObject/SwaggerToJavaScriptObject.csproj

      - name: Build
        run: dotnet build src/SwaggerToJavaScriptObject/SwaggerToJavaScriptObject.csproj -c Release --no-restore
